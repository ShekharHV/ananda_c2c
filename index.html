<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananda Voice Bot Demo - Schedule Your Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8dcc8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(139, 115, 85, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8b7355 0%, #a6895d 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .form-content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5a4a3a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0d5c7;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            color: #333;
        }

        input:focus {
            outline: none;
            border-color: #8b7355;
            background-color: #faf8f3;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        input::placeholder {
            color: #b8a899;
        }

        .phone-input-group {
            display: flex;
            gap: 8px;
        }

        .phone-code {
            flex: 0 0 60px;
            padding: 14px 12px;
            border: 2px solid #e0d5c7;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            background-color: #f9f6f0;
            color: #8b7355;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-number {
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b7355 0%, #a6895d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.3);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.4);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.loading {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
            padding: 0 30px 30px;
        }

        .error-text {
            font-size: 12px;
            color: #d4663f;
            margin-top: 5px;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-content {
                padding: 30px 20px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎤</div>
            <h1>ANANDA VOICE BOT</h1>
            <p>Experience Wellness with Our AI Voice Assistant</p>
        </div>

        <div class="form-content">
            <div id="message" class="message"></div>

            <form id="demoForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        required
                    >
                    <div class="error-text" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-group">
                        <div class="phone-code">+91</div>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            class="phone-number"
                            placeholder="Enter 10-digit number"
                            maxlength="10"
                            required
                        >
                    </div>
                    <div class="error-text" id="phoneError"></div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Get a Call Now
                </button>
            </form>

            <div class="footer-text">
                ✨ We'll call you shortly to discuss your wellness journey
            </div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://hv-sales-bot-degree-orchestrator.herovired.com/webhooks/lsq/lead/ananda';
        const API_KEY = 'al6d2506acf4d7b9606cdbd93favd9634985adeb4e49e9750dbe79';

        const form = document.getElementById('demoForm');
        const messageEl = document.getElementById('message');
        const nameInput = document.getElementById('name');
        const phoneInput = document.getElementById('phone');
        const submitBtn = document.getElementById('submitBtn');

        // Generate random ProspectID
        function generateProspectID() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 10000);
            return `ananda_${timestamp}_${random}`;
        }

        // Format timestamp
        function getCurrentTimestamp() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}.000`;
        }

        // Validate inputs
        function validateForm() {
            let isValid = true;
            const nameError = document.getElementById('nameError');
            const phoneError = document.getElementById('phoneError');

            // Reset error messages
            nameError.classList.remove('show');
            phoneError.classList.remove('show');

            // Validate name
            if (nameInput.value.trim().length < 2) {
                nameError.textContent = 'Please enter a valid name';
                nameError.classList.add('show');
                isValid = false;
            }

            // Validate phone
            const phoneValue = phoneInput.value.trim();
            if (phoneValue.length !== 10 || !/^\d{10}$/.test(phoneValue)) {
                phoneError.textContent = 'Please enter a valid 10-digit phone number';
                phoneError.classList.add('show');
                isValid = false;
            }

            return isValid;
        }

        // Show message
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            const firstName = nameInput.value.trim();
            const phoneNumber = phoneInput.value.trim();
            const prospectID = generateProspectID();
            const timestamp = getCurrentTimestamp();

            // Disable submit button
            submitBtn.disabled = true;
            showMessage('Processing your request...', 'loading');

            try {
                const payload = {
                    After: {},
                    Current: {
                        FirstName: firstName,
                        LastName: "",
                        Phone: `+91-${phoneNumber}`,
                        mx_Program_Details: "ananda",
                        ProspectID: prospectID,
                        mx_priority_hyperlap: "P02",
                        mx_C_Bot_TimeStamp: timestamp,
                        mx_Lead_Status: "Won",
                        mx_Lead_Sub_Stage: "testing",
                        mx_Lead_Type: "poc",
                        mx_Hyperlap_University_Name: "ana"
                    }
                };

                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showMessage('✓ Success! We will call you shortly at ' + '+91-' + phoneNumber, 'success');
                    form.reset();
                    setTimeout(() => {
                        messageEl.style.display = 'none';
                    }, 5000);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    showMessage('Something went wrong. Please try again.', 'error');
                    console.error('API Error:', errorData);
                }
            } catch (error) {
                showMessage('Connection error. Please check your internet and try again.', 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Real-time validation
        nameInput.addEventListener('blur', () => {
            const nameError = document.getElementById('nameError');
            if (nameInput.value.trim().length < 2 && nameInput.value.trim().length > 0) {
                nameError.textContent = 'Please enter a valid name';
                nameError.classList.add('show');
            } else {
                nameError.classList.remove('show');
            }
        });

        phoneInput.addEventListener('input', (e) => {
            // Only allow digits
            e.target.value = e.target.value.replace(/[^\d]/g, '');
        });

        phoneInput.addEventListener('blur', () => {
            const phoneError = document.getElementById('phoneError');
            const phoneValue = phoneInput.value.trim();
            if (phoneValue.length > 0 && phoneValue.length !== 10) {
                phoneError.textContent = 'Please enter a valid 10-digit phone number';
                phoneError.classList.add('show');
            } else {
                phoneError.classList.remove('show');
            }
        });
    </script>
</body>
</html>
